<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonight — a date decider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #2B1B3D;
    --plum-deep: #1D1129;
    --coral: #FF8B6B;
    --gold: #FFD9A0;
    --ivory: #F5EFE6;
    --lavender: #6B4C7A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--plum-deep), var(--plum) 60%);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(245, 239, 230, 0.04);
    border: 1px solid rgba(245, 239, 230, 0.12);
    border-radius: 20px;
    padding: 40px 32px;
    backdrop-filter: blur(12px);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--lavender);
    font-size: 14px;
    margin: 0 0 32px;
  }

  .dots {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(245, 239, 230, 0.2);
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .dot.active {
    background: var(--coral);
    transform: scale(1.3);
  }
  .dot.done {
    background: var(--gold);
  }

  .question-block { display: none; }
  .question-block.visible { display: block; animation: fadeIn 0.35s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-label {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin-bottom: 18px;
    line-height: 1.3;
  }

  .who {
    display: inline-block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--coral);
    margin-bottom: 6px;
  }

  .options {
    display: grid;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option {
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(245, 239, 230, 0.18);
    background: rgba(245, 239, 230, 0.03);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .option:hover {
    border-color: var(--coral);
  }
  .option.selected {
    border-color: var(--coral);
    background: rgba(255, 139, 107, 0.14);
  }

  input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(245, 239, 230, 0.18);
    background: rgba(245, 239, 230, 0.03);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    margin-bottom: 28px;
  }
  input[type="number"]::placeholder { color: rgba(245, 239, 230, 0.4); }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  button.primary {
    background: var(--coral);
    color: var(--plum-deep);
    border: none;
    padding: 13px 28px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  button.primary:hover { transform: scale(1.03); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  button.ghost {
    background: none;
    border: none;
    color: var(--lavender);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 20px 0;
  }
  .loading.visible { display: block; }
  .loading-icon {
    font-size: 40px;
    margin-bottom: 16px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  .loading-text {
    color: var(--lavender);
    font-size: 14px;
  }

  .result { display: none; }
  .result.visible { display: block; animation: fadeIn 0.4s ease; }

  .result-eyebrow {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--coral);
    margin-bottom: 8px;
  }
  .venue-name {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    margin: 0 0 4px;
  }
  .venue-address {
    color: var(--lavender);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .result-section {
    margin-bottom: 20px;
  }
  .result-section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .result-section-body {
    font-size: 15px;
    line-height: 1.5;
  }

  .error {
    display: none;
    color: var(--coral);
    font-size: 14px;
    margin-top: 12px;
  }
  .error.visible { display: block; }

  @media (prefers-reduced-motion: reduce) {
    .loading-icon, .question-block.visible, .result.visible { animation: none; }
  }
</style>
</head>
<body>

<div class="card">

  <div id="quiz">
    <h1>Where to tonight?</h1>
    <p class="subtitle">Five quick questions, one real answer.</p>

    <div class="dots" id="dots"></div>

    <!-- Question 1: Budget -->
    <div class="question-block" data-q="0">
      <span class="who" id="who-0"></span>
      <div class="q-label">What's a comfortable budget, per person?</div>
      <input type="number" id="budget" placeholder="e.g. 800" min="0">
      <div class="nav-row">
        <button class="ghost" onclick="prevQuestion()" style="visibility:hidden">Back</button>
        <button class="primary" onclick="nextQuestion()">Next</button>
      </div>
    </div>

    <!-- Question 2: Vibe -->
    <div class="question-block" data-q="1">
      <span class="who" id="who-1"></span>
      <div class="q-label">What kind of vibe are you after?</div>
      <div class="options" id="options-vibe">
        <button class="option" data-value="chill">Chill and low-key</button>
        <button class="option" data-value="romantic">Romantic</button>
        <button class="option" data-value="adventurous">Adventurous</button>
        <button class="option" data-value="fun_loud">Fun and lively</button>
      </div>
      <div class="nav-row">
        <button class="ghost" onclick="prevQuestion()">Back</button>
        <button class="primary" id="next-1" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>

    <!-- Question 3: Cuisine -->
    <div class="question-block" data-q="2">
      <span class="who" id="who-2"></span>
      <div class="q-label">Any cuisine or place preference?</div>
      <div class="options" id="options-cuisine">
        <button class="option" data-value="cafe">Cafe / coffee</button>
        <button class="option" data-value="italian">Italian</button>
        <button class="option" data-value="street_food">Street food</button>
        <button class="option" data-value="fine_dining">Fine dining</button>
      </div>
      <div class="nav-row">
        <button class="ghost" onclick="prevQuestion()">Back</button>
        <button class="primary" id="next-2" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>

    <!-- Question 4: Indoor/outdoor -->
    <div class="question-block" data-q="3">
      <span class="who" id="who-3"></span>
      <div class="q-label">Indoor or outdoor?</div>
      <div class="options" id="options-io">
        <button class="option" data-value="indoor">Indoor</button>
        <button class="option" data-value="outdoor">Outdoor</button>
      </div>
      <div class="nav-row">
        <button class="ghost" onclick="prevQuestion()">Back</button>
        <button class="primary" id="next-3" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>

    <!-- Question 5: Occasion -->
    <div class="question-block" data-q="4">
      <span class="who" id="who-4"></span>
      <div class="q-label">What's the occasion?</div>
      <div class="options" id="options-occasion">
        <button class="option" data-value="casual">Just because</button>
        <button class="option" data-value="anniversary">Anniversary</button>
        <button class="option" data-value="first_date">First date</button>
      </div>
      <div class="nav-row">
        <button class="ghost" onclick="prevQuestion()">Back</button>
        <button class="primary" id="next-4" onclick="nextQuestion()" disabled>Plan it</button>
      </div>
    </div>

    <div class="error" id="error"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-icon" id="loading-icon">📍</div>
    <div class="loading-text" id="loading-text">Finding a place nearby…</div>
  </div>

  <div class="result" id="result">
    <div class="result-eyebrow">Tonight's plan</div>
    <div class="venue-name" id="result-venue"></div>
    <div class="venue-address" id="result-address"></div>

    <div class="result-section">
      <div class="result-section-label">Why this</div>
      <div class="result-section-body" id="result-reasoning"></div>
    </div>

    <div class="result-section">
      <div class="result-section-label">What to wear</div>
      <div class="result-section-body" id="result-outfit"></div>
    </div>

    <button class="ghost" onclick="restart()">Plan another →</button>
  </div>

</div>

<script>
  // Point this at your deployed API's real URL once it's live.
  // For local testing against a locally-running backend, use:
  //   http://127.0.0.1:8000/plan-date
  // For the deployed version, Render will give you a URL that looks like:
  //   https://date-planner-api-XXXX.onrender.com/plan-date
  // Update this ONE line after deploying the backend — nothing else changes.
  const API_URL = "http://127.0.0.1:8000/plan-date";

  const TOTAL_QUESTIONS = 5;
  let currentQuestion = 0;
  let currentPartner = "a"; // we ask all 5 for partner A, then all 5 for partner B
  const answers = { a: {}, b: {} };

  const fieldNames = ["budget", "vibe", "cuisine", "indoor_outdoor", "occasion"];

  function renderDots() {
    const dotsEl = document.getElementById("dots");
    dotsEl.innerHTML = "";
    for (let i = 0; i < TOTAL_QUESTIONS; i++) {
      const dot = document.createElement("div");
      dot.className = "dot";
      if (i < currentQuestion) dot.classList.add("done");
      if (i === currentQuestion) dot.classList.add("active");
      dotsEl.appendChild(dot);
    }
  }

  function showQuestion(index) {
    document.querySelectorAll(".question-block").forEach(el => {
      el.classList.toggle("visible", parseInt(el.dataset.q) === index);
    });
    const whoLabel = currentPartner === "a" ? "Partner 1" : "Partner 2";
    document.getElementById("who-" + index).textContent = whoLabel;
    renderDots();
  }

  // wire up option buttons
  document.querySelectorAll(".options").forEach(group => {
    group.querySelectorAll(".option").forEach(btn => {
      btn.addEventListener("click", () => {
        group.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        const qIndex = parseInt(btn.closest(".question-block").dataset.q);
        document.getElementById("next-" + qIndex).disabled = false;
      });
    });
  });

  function collectCurrentAnswer() {
    const field = fieldNames[currentQuestion];
    if (field === "budget") {
      const val = document.getElementById("budget").value;
      if (!val || parseInt(val) <= 0) return false;
      answers[currentPartner].budget = parseInt(val);
      return true;
    } else {
      const groupId = field === "indoor_outdoor" ? "options-io" : "options-" + (field === "vibe" ? "vibe" : field === "cuisine" ? "cuisine" : "occasion");
      const selected = document.querySelector("#" + groupId + " .option.selected");
      if (!selected) return false;
      answers[currentPartner][field] = selected.dataset.value;
      return true;
    }
  }

  function nextQuestion() {
    if (!collectCurrentAnswer()) return;

    if (currentQuestion < TOTAL_QUESTIONS - 1) {
      currentQuestion++;
      showQuestion(currentQuestion);
    } else if (currentPartner === "a") {
      // finished partner A's 5 questions — reset and start partner B's
      currentPartner = "b";
      currentQuestion = 0;
      resetOptionSelections();
      document.getElementById("budget").value = "";
      showQuestion(currentQuestion);
    } else {
      // finished both partners — submit
      submitAnswers();
    }
  }

  function prevQuestion() {
    if (currentQuestion > 0) {
      currentQuestion--;
      showQuestion(currentQuestion);
    } else if (currentPartner === "b") {
      currentPartner = "a";
      currentQuestion = TOTAL_QUESTIONS - 1;
      showQuestion(currentQuestion);
    }
  }

  function resetOptionSelections() {
    document.querySelectorAll(".option.selected").forEach(el => el.classList.remove("selected"));
    document.querySelectorAll("button[id^='next-']").forEach(btn => btn.disabled = true);
  }

  const loadingMessages = [
    { icon: "📍", text: "Finding a place nearby…" },
    { icon: "✨", text: "Thinking it over…" },
    { icon: "👔", text: "Picking an outfit…" },
  ];

  function cycleLoadingMessages() {
    let i = 0;
    const iconEl = document.getElementById("loading-icon");
    const textEl = document.getElementById("loading-text");
    return setInterval(() => {
      i = (i + 1) % loadingMessages.length;
      iconEl.textContent = loadingMessages[i].icon;
      textEl.textContent = loadingMessages[i].text;
    }, 1400);
  }

  async function submitAnswers() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("loading").classList.add("visible");
    const cycleHandle = cycleLoadingMessages();

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        await callApi(position.coords.latitude, position.coords.longitude, cycleHandle);
      },
      async (err) => {
        // geolocation denied or failed — fall back to a default location
        // rather than blocking the whole flow
        console.warn("Geolocation unavailable, using fallback:", err.message);
        await callApi(28.6139, 77.2090, cycleHandle); // Delhi fallback
      }
    );
  }

  async function callApi(latitude, longitude, cycleHandle) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          partner_a_answers: answers.a,
          partner_b_answers: answers.b,
          latitude: latitude,
          longitude: longitude,
        }),
      });

      if (!response.ok) {
        throw new Error(`API returned ${response.status}`);
      }

      const data = await response.json();
      clearInterval(cycleHandle);
      showResult(data);
    } catch (err) {
      clearInterval(cycleHandle);
      document.getElementById("loading").classList.remove("visible");
      document.getElementById("quiz").style.display = "block";
      const errorEl = document.getElementById("error");
      errorEl.textContent = "Couldn't reach the planner right now — check that the API is running, then try again.";
      errorEl.classList.add("visible");
      console.error(err);
    }
  }

  function showResult(data) {
    document.getElementById("loading").classList.remove("visible");
    document.getElementById("result").classList.add("visible");

    if (data.venue) {
      document.getElementById("result-venue").textContent = data.venue.name;
      document.getElementById("result-address").textContent = data.venue.address;
    } else {
      document.getElementById("result-venue").textContent = "No venue found";
      document.getElementById("result-address").textContent = "Try adjusting your answers and planning again.";
    }
    document.getElementById("result-reasoning").textContent = data.reasoning;
    document.getElementById("result-outfit").textContent = data.outfit_suggestion;
  }

  function restart() {
    location.reload();
  }

  showQuestion(0);
</script>

</body>
</html>
